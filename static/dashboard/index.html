<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akashic Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">A</div>
        <div>
          <div class="brand-title">Akashic Dashboard</div>
          <div class="brand-sub">Session / Memory Explorer</div>
        </div>
      </div>
      <div class="topbar-filters">
        <div class="filter-row" id="messageFilters">
          <label class="search">
            <span>⌕</span>
            <input id="msgSearch" type="text" placeholder="搜索消息内容">
          </label>
          <select id="msgRoleFilter">
            <option value="">全部 role</option>
            <option value="user">user</option>
            <option value="assistant">assistant</option>
            <option value="system">system</option>
            <option value="tool">tool</option>
          </select>
          <div class="active-session-chip hidden" id="activeSessionChip">
            <span>session</span>
            <code id="activeSessionText"></code>
            <button id="clearSessionFilter" type="button">×</button>
          </div>
        </div>
        <div class="filter-row hidden" id="memoryFilters">
          <label class="search">
            <span>⌕</span>
            <input id="memorySearch" type="text" placeholder="搜索 memory / source_ref">
          </label>
          <select id="memoryTypeFilter">
            <option value="">全部 type</option>
            <option value="procedure">procedure</option>
            <option value="preference">preference</option>
            <option value="event">event</option>
            <option value="profile">profile</option>
          </select>
          <select id="memoryStatusFilter">
            <option value="">全部 status</option>
            <option value="active">active</option>
            <option value="superseded">superseded</option>
          </select>
          <div class="active-session-chip hidden" id="activeMemoryScopeChip">
            <span>scope</span>
            <code id="activeMemoryScopeText"></code>
            <button id="clearMemoryScopeFilter" type="button">×</button>
          </div>
        </div>
        <div class="filter-row hidden" id="proactiveFilters">
          <div class="active-session-chip" id="activeProactiveSectionChip">
            <span>result</span>
            <code id="activeProactiveSectionText"></code>
          </div>
          <div class="active-session-chip hidden" id="activeProactiveSessionChip">
            <span>session</span>
            <code id="activeProactiveSessionText"></code>
            <button id="clearProactiveSessionFilter" type="button">×</button>
          </div>
        </div>
      </div>
      <div class="topbar-view">
        <div class="view-chip" id="viewChip">
          <span id="viewChipLabel">messages</span>
        </div>
      </div>
    </header>

    <main class="workspace">
      <aside class="sessions-pane">
        <div class="pane-head">
          <div>
            <div class="pane-kicker">Explorer</div>
            <div class="pane-title" id="sessionCountTitle">0 个会话</div>
          </div>
        </div>
        <div class="filters-stack" id="sessionSidebarFilters">
          <label class="search search-small">
            <span>⌕</span>
            <input id="sessionSearch" type="text" placeholder="过滤 session">
          </label>
          <select id="sessionChannelFilter">
            <option value="">全部 channel</option>
          </select>
        </div>
        <nav class="explorer-nav">
          <section class="nav-group" id="sessionsNavGroup">
            <button class="nav-group-toggle" id="sessionsNavToggle" type="button">
              <span class="nav-group-caret">▾</span>
              <span class="nav-group-label">Sessions</span>
              <span class="nav-group-count" id="allMessagesCount">0</span>
            </button>
            <div class="nav-group-body" id="sessionsNavBody">
              <button class="all-messages-row" id="allMessagesButton" type="button">
                <span>全部消息</span>
                <strong id="allSessionsCount">0</strong>
              </button>
              <div class="session-list" id="sessionList"></div>
            </div>
          </section>

          <section class="nav-group" id="memoryNavGroup">
            <button class="nav-group-toggle" id="memoryNavToggle" type="button">
              <span class="nav-group-caret">▸</span>
              <span class="nav-group-label">Memory</span>
              <span class="nav-group-count" id="memoryCountBadge">0</span>
            </button>
            <div class="nav-group-body hidden" id="memoryNavBody">
              <button class="all-messages-row" id="allMemoriesButton" type="button">
                <span>全部记忆</span>
                <strong id="allMemoriesCount">0</strong>
              </button>
              <div class="memory-quick-list" id="memoryTypeList"></div>
            </div>
          </section>

          <section class="nav-group" id="proactiveNavGroup">
            <button class="nav-group-toggle" id="proactiveNavToggle" type="button">
              <span class="nav-group-caret">▸</span>
              <span class="nav-group-label">Proactive</span>
              <span class="nav-group-count" id="proactiveCountBadge">0</span>
            </button>
            <div class="nav-group-body hidden" id="proactiveNavBody">
              <button class="all-messages-row" id="proactiveAllButton" type="button">
                <span>Tick Logs</span>
                <strong id="proactiveOverviewCount">0</strong>
              </button>
              <div class="proactive-quick-list" id="proactiveSectionList"></div>
            </div>
          </section>
        </nav>
      </aside>

      <section class="messages-pane">
        <div class="batch-bar hidden" id="batchBar">
          <span id="batchCount">已选 0 条</span>
          <button class="danger-ghost" id="batchDeleteButton" type="button">批量删除</button>
          <button class="ghost" id="clearSelectionButton" type="button">取消选择</button>
        </div>

        <div class="table-head" id="tableHead"></div>
        <div class="table-body" id="messageTable"></div>
        <footer class="table-foot">
          <div id="messageMeta">共 0 条</div>
          <div class="pager">
            <button class="ghost" id="prevPageButton" type="button">‹</button>
            <span id="pageText">1 / 1</span>
            <button class="ghost" id="nextPageButton" type="button">›</button>
          </div>
        </footer>
      </section>

      <aside class="detail-pane" id="detailPane">
        <div class="detail-empty">
          <div class="detail-empty-title">详情</div>
          <div class="detail-empty-text">点开消息、session 或 memory 后，这里会显示完整内容、字段和 JSON 信息。</div>
        </div>
      </aside>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="modalBackdrop"></div>
  <div class="modal hidden" id="modal"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
