# ============================================================
# LongMemEval Benchmark Config
# ============================================================
# Copy this file to eval/longmemeval/config.toml and fill in
# your API keys, then run:
#
#   python -m eval.longmemeval.run \
#     --config eval/longmemeval/config.toml \
#     --data eval/longmemeval/data/longmemeval_akashic.json \
#     --workspace /tmp/lme_bench \
#     --limit 1
#
# Three models are used. You can point them all at the same
# provider, or mix providers to minimise cost:
#
#   main    — the agent that answers QA questions (1 call per question)
#   fast    — consolidation + HyDE + query-rewrite + sufficiency gates
#             (many small calls per instance; use the cheapest capable model)
#   embed   — vector embedding (called for every memory write + recall)
# ============================================================

[llm]
provider = "deepseek"        # or "qwen" / "openai" — cosmetic label only

# ── Main model: agent reasoning during QA ───────────────────
# One full tool-use turn per question. A mid-tier model is fine.
# Suggestions: deepseek-chat, qwen-plus, gpt-4o-mini
[llm.main]
model     = "deepseek-chat"
api_key   = "${BENCH_API_KEY}"
base_url  = "https://api.deepseek.com/v1"

# ── Fast model: consolidation + memory gates ─────────────────
# Called ~10-30 times per instance during ingest consolidation,
# and 2-4 times per QA call (HyDE hypotheses, query rewrite,
# sufficiency check). Must be fast and cheap.
# Suggestions: deepseek-chat (same), qwen-turbo, gpt-4o-mini
[llm.fast]
model     = "deepseek-chat"
api_key   = "${BENCH_API_KEY}"
base_url  = "https://api.deepseek.com/v1"

# ── Agent settings ────────────────────────────────────────────
[agent]
system_prompt   = "You are a helpful personal assistant with long-term memory. When the user asks about past conversations or personal details, always use your memory tools to retrieve the relevant information before answering. Answer concisely in English in one sentence or less — no greetings, no follow-up questions, no emojis."
max_tokens      = 2048
max_iterations  = 12

[agent.context]
memory_window = 80    # keep_count = 40; consolidates every ~20 turns (~2 sessions)

[agent.tools]
search_enabled = false   # tool_search adds latency; not needed for benchmark

[agent.wiring]
context  = "default"
memory   = "default"
# meta_common gives: recall_memory, search_messages, fetch_messages,
#                    memorize, web_search, shell (noise), tool_search
# No fitbit / spawn / schedule / mcp needed for benchmark.
toolsets = ["meta_common"]

# ── Channels: disabled ───────────────────────────────────────
[channels.telegram]
token      = ""
allow_from = []

# ── Embedding model ──────────────────────────────────────────
# Called once per memory write during consolidation, and once
# per recall_memory call during QA. Use a cheap text-embedding API.
# Suggestions: text-embedding-v3 (Qwen/Dashscope), text-embedding-3-small (OpenAI)
[memory]
enabled = true

[memory.embedding]
model    = "text-embedding-v3"
api_key  = "${BENCH_EMBED_API_KEY}"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

[memory.retrieval]
top_k_history   = 8
score_threshold = 0.40    # slightly lower than production; benchmark conversations
relative_delta  = 0.2     # are English, embedding space may be noisier
route_intention = false   # skip intent-routing gate to save LLM calls

[memory.retrieval.thresholds]
procedure = 0.60
preference = 0.45
event      = 0.45
profile    = 0.45

[memory.retrieval.inject]
max_chars      = 4000
line_max       = 400
event_profile  = 6     # allow more auto-injected facts for QA

[memory.gate]
llm_timeout_ms = 2000
max_tokens     = 150

[memory.hyde]
enabled    = true
timeout_ms = 3000

# ── Proactive: disabled ───────────────────────────────────────
[proactive]
enabled = false
profile = "quiet"

[proactive.target]
channel = ""
chat_id = ""
