[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    scenario_mvp: agent loop 基础场景测试
    scenario_live: 需要真实 LLM 的 agent loop 场景测试
    proactive_scenario: 需要真实 LLM 的 proactive reflect 行为契约测试
    scenario_routing: tool_search 路由行为 baseline 测试
    live_replay: 使用真实 light provider 对历史回放样本做诊断型抽取测试
